<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SpiderNet Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
          --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;
          --accent:#00ff88;--accent2:#ff3366;
          --text:#f0f0f0;--muted:#666;--border:#222;
          --font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;
        }
        body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh}

        /* NAV */
        nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);z-index:100}
        .logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
        .logo span{color:var(--accent)}
        .nav-links{display:flex;gap:32px;list-style:none}
        .nav-links a{color:var(--muted);text-decoration:none;font-size:13px;letter-spacing:.05em;transition:color .2s}
        .nav-links a:hover{color:var(--text)}
        .nav-right{display:flex;align-items:center;gap:16px}
        .btn{padding:9px 20px;border-radius:6px;font-family:var(--font-display);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
        .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
        .btn-accent{background:var(--accent);color:#000}
        .btn-accent:hover{background:#00e67a}
        #userMenu{display:none;align-items:center;gap:16px}
        .balance-badge{font-family:var(--font-mono);font-size:12px;color:var(--accent);border:1px solid var(--accent);padding:5px 12px;border-radius:4px}

        /* HERO */
        .hero{padding:80px 40px 60px;max-width:1200px;margin:0 auto}
        .hero-label{font-family:var(--font-mono);font-size:11px;color:var(--accent);letter-spacing:.15em;margin-bottom:20px}
        .hero h1{font-size:clamp(42px,6vw,80px);font-weight:800;line-height:1;letter-spacing:-2px;margin-bottom:24px}
        .hero h1 em{color:var(--accent);font-style:normal}
        .hero p{color:var(--muted);font-size:16px;max-width:480px;line-height:1.7;margin-bottom:36px}
        .hero-actions{display:flex;gap:12px}
        .search-bar{display:flex;align-items:center;gap:0;max-width:600px;margin:40px 0 0}
        .search-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-right:none;color:var(--text);padding:14px 20px;font-family:var(--font-display);font-size:14px;outline:none;border-radius:8px 0 0 8px}
        .search-bar input::placeholder{color:var(--muted)}
        .search-bar input:focus{border-color:var(--accent)}
        .search-bar button{background:var(--accent);color:#000;border:none;padding:14px 24px;font-family:var(--font-display);font-weight:700;font-size:13px;cursor:pointer;border-radius:0 8px 8px 0;transition:background .2s}
        .search-bar button:hover{background:#00e67a}

        /* CATEGORIES */
        .section{padding:40px 40px;max-width:1200px;margin:0 auto}
        .section-header{display:flex;align-items:baseline;gap:16px;margin-bottom:28px}
        .section-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
        .section-count{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
        .cats{display:flex;gap:10px;flex-wrap:wrap}
        .cat{padding:8px 18px;border:1px solid var(--border);border-radius:100px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;background:var(--surface)}
        .cat:hover,.cat.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,.06)}

        /* PRODUCTS GRID */
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
        .product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
        .product-card:hover{border-color:var(--accent);transform:translateY(-3px)}
        .product-card:hover .card-arrow{opacity:1;transform:translate(0,0)}
        .card-img{height:160px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;border-bottom:1px solid var(--border)}
        .card-body{padding:16px}
        .card-category{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:8px}
        .card-title{font-size:15px;font-weight:600;margin-bottom:8px;line-height:1.3}
        .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
        .card-price{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--accent)}
        .card-stock{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
        .card-rating{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);margin-top:6px}
        .card-rating span{color:#ffd700}
        .card-arrow{position:absolute;top:16px;right:16px;opacity:0;transform:translate(4px,-4px);transition:all .2s;color:var(--accent);font-size:18px}
        .badge{position:absolute;top:12px;left:12px;background:var(--accent2);color:#fff;font-family:var(--font-mono);font-size:10px;padding:3px 8px;border-radius:4px;letter-spacing:.05em}

        /* TOAST */
        .toast{position:fixed;bottom:32px;right:32px;background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:14px 20px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:999;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}

        /* FOOTER */
        footer{border-top:1px solid var(--border);padding:40px;margin-top:80px;display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px}
        .footer-logo{font-weight:800;font-size:16px;color:var(--text)}
        .footer-logo span{color:var(--accent)}

        @media(max-width:768px){
          nav{padding:16px 20px}
          .hero{padding:50px 20px 40px}
          .section{padding:30px 20px}
          .hero h1{font-size:38px}
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Spider<span>Net</span></div>
    <ul class="nav-links">
        <li><a href="/">Каталог</a></li>
        <li><a href="#" onclick="requireAuth('/orders')">Заказы</a></li>
        <li><a href="#" onclick="requireAuth('/seller')">Продавцам</a></li>
    </ul>
    <div class="nav-right">
        <div id="guestMenu" style="display:flex;gap:10px">
            <button class="btn btn-ghost" onclick="location.href='/login'">Войти</button>
            <button class="btn btn-accent" onclick="location.href='/register'">Регистрация</button>
        </div>
        <div id="userMenu">
            <span class="balance-badge" id="balanceLabel">0.00 ₽</span>
            <button class="btn btn-ghost" onclick="location.href='/profile'">Профиль</button>
            <button class="btn btn-ghost" onclick="logout()">Выйти</button>
        </div>
    </div>
</nav>

<div class="hero">
    <div class="hero-label">// цифровые товары</div>
    <h1>Магазин бебриса Будата<br/><em>Кал</em> Говно и моча.</h1>
    <p>Вас здесь наебут 100%.</p>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Поиск товаров..." onkeydown="if(event.key==='Enter')search()"/>
        <button onclick="search()">Найти</button>
    </div>
</div>

<div class="section">
    <div class="section-header">
        <span class="section-title">Категории</span>
    </div>
    <div class="cats" id="catsContainer">
        <div class="cat active" onclick="filterCat(null,this)">Все</div>
    </div>
</div>

<div class="section">
    <div class="section-header">
        <span class="section-title">Товары</span>
        <span class="section-count" id="productCount">загрузка...</span>
    </div>
    <div class="products-grid" id="productsGrid">
        <div style="color:var(--muted);font-size:14px;grid-column:1/-1;padding:40px 0">Загрузка...</div>
    </div>
</div>

<footer>
    <div class="footer-logo">Spider<span>Net</span></div>
    <span>© 2025 SpiderNet Store</span>
</footer>

<div class="toast" id="toast"></div>

<script>
    let currentCat = null;
    let currentPage = 0;
    let isLoading = false;
    let hasNext = true;
    let currentQuery = null;

    // INIT
    async function init() {
      try {
        const res = await fetch('/api/users/me', { credentials: 'include' });
        if (res.ok) {
          const user = await res.json();
          document.getElementById('guestMenu').style.display = 'none';
          document.getElementById('userMenu').style.display = 'flex';
          document.getElementById('balanceLabel').textContent =
            parseFloat(user.balance).toFixed(2) + ' ₽';
        }
      } catch(e) {}

      await loadCategories();
      resetAndLoad();
    }

    // RESET (важно)
    function resetAndLoad() {
      currentPage = 0;
      hasNext = true;

      document.getElementById('productsGrid').innerHTML = '';
      loadProducts();
    }

    // ЗАГРУЗКА
    async function loadProducts() {
      if (isLoading || !hasNext) return;

      isLoading = true;

      let url = `/api/products?page=${currentPage}`;

      if (currentCat) url += `&categoryId=${currentCat}`;
      if (currentQuery) url += `&q=${encodeURIComponent(currentQuery)}`;

      try {
        const res = await fetch(url, { credentials: 'include' });
        const data = await res.json();

        const products = data.items;

        renderProducts(products);

        document.getElementById('productCount').textContent =
          data.totalElements + ' товаров';

        hasNext = currentPage < data.totalPages - 1;
        currentPage++;

      } catch(e) {
        console.error(e);
      }

      isLoading = false;
    }

    // РЕНДЕР
    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');

      const html = products.map(p => {
        const categoryText = p.categories?.join(', ') || 'Цифровой товар';
        const firstCategory = p.categories?.[0];

        return `
          <div class="product-card" onclick="location.href='/product/${p.id}'">
            ${p.stockCount === 0 ? '<div class="badge">НЕТ В НАЛИЧИИ</div>' : ''}

            <div class="card-img">${getCategoryEmoji(firstCategory)}</div>

            <div class="card-body">
              <div class="card-category">${categoryText}</div>

              <div class="card-title">${p.title}</div>

              <div class="card-rating">
                <span>★</span> ${p.rating ? Number(p.rating).toFixed(1) : '—'}
              </div>

              <div class="card-footer">
                <div class="card-price">${Number(p.price).toFixed(2)} ₽</div>
                <div class="card-stock">${p.stockCount} шт.</div>
              </div>
            </div>

            <div class="card-arrow">↗</div>
          </div>
        `;
      }).join('');

      grid.insertAdjacentHTML('beforeend', html);
    }
    // SCROLL
    window.addEventListener('scroll', () => {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        loadProducts();
      }
    });

    // CATEGORIES
    async function loadCategories() {
      try {
        const res = await fetch('/api/categories', { credentials: 'include' });
        const cats = await res.json();

        const container = document.getElementById('catsContainer');

        cats.forEach(c => {
          const el = document.createElement('div');
          el.className = 'cat';
          el.textContent = c.name;
          el.onclick = () => filterCat(c.id, el);
          container.appendChild(el);
        });
      } catch(e) {}
    }

    function filterCat(id, el) {
      currentCat = id;
      currentQuery = null;

      document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
      el.classList.add('active');

      resetAndLoad();
    }

    // НОВАЯ ФУНКЦИЯ ПОИСКА — редирект на отдельную страницу
    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      // редирект на /search?q=...
      window.location.href = `/search?q=${encodeURIComponent(query)}`;
    }

    // UTILS
    function getCategoryEmoji(name) {
      if (!name) return '📦';
      const n = name.toLowerCase();
      if (n.includes('игр')) return '🎮';
      if (n.includes('прокси')) return '🌐';
      if (n.includes('аккаунт')) return '👤';
      if (n.includes('ключ')) return '🔑';
      return '📦';
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      location.reload();
    }

    init();
</script>
</body>
</html>
