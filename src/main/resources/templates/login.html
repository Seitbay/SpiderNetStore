<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Вход — SpiderNet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;
  --accent:#00ff88;--accent2:#ff3366;
  --text:#f0f0f0;--muted:#666;--border:#222;
  --font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--text)}
.logo span{color:var(--accent)}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:420px}
.card-label{font-family:var(--font-mono);font-size:11px;color:var(--accent);letter-spacing:.15em;margin-bottom:16px}
.card h1{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.card p{color:var(--muted);font-size:14px;margin-bottom:36px;line-height:1.6}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;font-weight:600;letter-spacing:.05em;color:var(--muted);margin-bottom:8px}
.form-group input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px 16px;font-family:var(--font-display);font-size:14px;outline:none;border-radius:8px;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:#333}

.btn-submit{width:100%;background:var(--accent);color:#000;border:none;padding:15px;font-family:var(--font-display);font-weight:800;font-size:15px;cursor:pointer;border-radius:8px;transition:all .2s;letter-spacing:-.3px;margin-top:8px}
.btn-submit:hover{background:#00e67a;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-box{background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.3);color:#ff6688;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:20px;display:none}
.error-box.show{display:block}

.divider{text-align:center;color:var(--muted);font-size:13px;margin:24px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}

.link-row{text-align:center;font-size:13px;color:var(--muted);margin-top:24px}
.link-row a{color:var(--accent);text-decoration:none;font-weight:600}
.link-row a:hover{text-decoration:underline}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Spider<span>Net</span></a>
</nav>
<div class="page">
  <div class="card">
    <div class="card-label">// авторизация</div>
    <h1>С возвращением</h1>
    <p>Войдите чтобы покупать товары и управлять заказами.</p>

    <div class="error-box" id="errorBox"></div>

    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div class="form-group">
      <label>ПАРОЛЬ</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="login()">Войти</button>

    <div class="link-row" style="margin-top:16px">
      Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorBox');

  err.classList.remove('show');

  if (!email || !password) {
    err.textContent = 'Заполните все поля';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Входим...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      const redirect = new URLSearchParams(location.search).get('redirect') || '/';
      location.href = redirect;
    } else {
      err.textContent = data.error || 'Ошибка входа';
      err.classList.add('show');
    }
  } catch(e) {
    err.textContent = 'Ошибка сети. Попробуйте снова.';
    err.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Войти';
}
</script>
</body>
</html>
