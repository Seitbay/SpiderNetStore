<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Поиск — SpiderNet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--accent:#00ff88;--accent2:#ff3366;--text:#f0f0f0;--muted:#666;--border:#222;--font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh}

/* SEARCH HEADER - компактный, без героя */
.search-header{padding:16px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:24px;position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);z-index:100}
.logo{font-size:18px;font-weight:800;cursor:pointer;flex-shrink:0}.logo span{color:var(--accent)}
.search-wrap{flex:1;max-width:680px;position:relative}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 48px 12px 20px;font-family:var(--font-display);font-size:14px;outline:none;border-radius:8px;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-btn{position:absolute;right:0;top:0;bottom:0;background:var(--accent);color:#000;border:none;padding:0 20px;border-radius:0 8px 8px 0;font-weight:700;cursor:pointer;font-size:13px;font-family:var(--font-display)}
.nav-right{display:flex;gap:10px;flex-shrink:0}
.btn{padding:8px 16px;border-radius:6px;font-family:var(--font-display);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* SUGGESTIONS dropdown */
.suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;z-index:200;display:none}
.suggestions.open{display:block}
.suggest-item{padding:10px 20px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.suggest-item:hover{background:var(--surface2)}
.suggest-icon{color:var(--muted);font-family:var(--font-mono);font-size:11px}

/* LAYOUT */
.page{display:flex;gap:0;max-width:1200px;margin:0 auto}

/* FILTERS SIDEBAR */
.filters{width:240px;flex-shrink:0;padding:28px 24px;border-right:1px solid var(--border);min-height:calc(100vh - 65px)}
.filter-title{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.12em;margin-bottom:12px;margin-top:24px}
.filter-title:first-child{margin-top:0}
.filter-cats{display:flex;flex-direction:column;gap:4px}
.filter-cat{padding:8px 12px;border-radius:6px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;border:1px solid transparent}
.filter-cat:hover{background:var(--surface);color:var(--text)}
.filter-cat.active{background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.2);color:var(--accent)}
.price-range{display:flex;gap:8px;align-items:center}
.price-input{width:90px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;font-family:var(--font-mono);font-size:12px;outline:none;border-radius:6px}
.price-input:focus{border-color:var(--accent)}
.price-sep{color:var(--muted);font-size:12px}
.sort-btns{display:flex;flex-direction:column;gap:4px}
.sort-btn{padding:8px 12px;border-radius:6px;font-size:13px;color:var(--muted);cursor:pointer;border:1px solid transparent;background:none;text-align:left;font-family:var(--font-display);transition:all .15s}
.sort-btn:hover{background:var(--surface);color:var(--text)}
.sort-btn.active{background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.2);color:var(--accent)}
.apply-btn{width:100%;background:var(--accent);color:#000;border:none;padding:11px;border-radius:6px;font-family:var(--font-display);font-weight:700;font-size:13px;cursor:pointer;margin-top:20px}
.apply-btn:hover{background:#00e67a}

/* RESULTS */
.results{flex:1;padding:28px 32px}
.results-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.results-query{font-size:20px;font-weight:800;letter-spacing:-.5px}
.results-query em{color:var(--accent);font-style:normal}
.results-count{font-family:var(--font-mono);font-size:12px;color:var(--muted)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .22s}
.product-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-img{height:130px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:40px;border-bottom:1px solid var(--border)}
.card-body{padding:14px}
.card-cat{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px}
.card-title{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.3}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.card-price{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--accent)}
.card-stock{font-family:var(--font-mono);font-size:9px;color:var(--muted)}
.card-rating{font-size:11px;color:var(--muted)}
.card-rating span{color:#ffd700}
.load-more{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:8px;font-family:var(--font-display);font-weight:600;font-size:14px;cursor:pointer;margin-top:20px;transition:all .2s;display:none}
.load-more:hover{border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-title{font-size:20px;font-weight:800;margin-bottom:12px;color:var(--text)}
.empty-sub{font-size:14px;line-height:1.7;margin-bottom:24px}
.empty-suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.suggest-tag{padding:6px 14px;border:1px solid var(--border);border-radius:100px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s}
.suggest-tag:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:768px){
  .search-header{padding:12px 16px;flex-wrap:wrap}
  .logo{display:none}
  .filters{display:none}
  .results{padding:20px 16px}
}
</style>
</head>
<body>

<div class="search-header">
  <div class="logo" onclick="location.href='/'">Spider<span>Net</span></div>

  <div class="search-wrap">
    <input class="search-input" type="text" id="searchInput"
      placeholder="Поиск товаров..."
      oninput="onInput(this.value)"
      onkeydown="if(event.key==='Enter'){hideSuggestions();doSearch()}"
      onfocus="if(this.value.length>1)showSuggestions(this.value)"
      onblur="setTimeout(hideSuggestions,150)"/>
    <button class="search-btn" onclick="hideSuggestions();doSearch()">Найти</button>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="nav-right" id="navRight">
    <button class="btn btn-ghost" onclick="location.href='/login'">Войти</button>
  </div>
</div>

<div class="page">
  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-title">Категория</div>
    <div class="filter-cats" id="filterCats">
      <div class="filter-cat active" onclick="selectCat(null,this)">Все</div>
    </div>

    <div class="filter-title">Цена</div>
    <div class="price-range">
      <input class="price-input" type="number" id="priceMin" placeholder="от"/>
      <span class="price-sep">—</span>
      <input class="price-input" type="number" id="priceMax" placeholder="до"/>
    </div>

    <div class="filter-title">Сортировка</div>
    <div class="sort-btns">
      <button class="sort-btn active" onclick="selectSort('createdAt',this)">Новые</button>
      <button class="sort-btn" onclick="selectSort('price',this)">Дешевле</button>
      <button class="sort-btn" onclick="selectSort('price_desc',this)">Дороже</button>
      <button class="sort-btn" onclick="selectSort('rating',this)">По рейтингу</button>
    </div>

    <button class="apply-btn" onclick="applyFilters()">Применить</button>
  </div>

  <!-- RESULTS -->
  <div class="results">
    <div class="results-meta">
      <div class="results-query" id="queryLabel">Все товары</div>
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
    <button class="load-more" id="loadMoreBtn" onclick="loadMore()">Показать ещё</button>
  </div>
</div>

<script>
let currentPage = 0;
let isLoading = false;
let hasNext = true;
let currentQ = '';
let currentCat = null;
let currentSort = 'createdAt';
let suggestTimer = null;

// --- INIT ---
async function init() {
  const params = new URLSearchParams(location.search);
  currentQ = params.get('q') || '';
  if (currentQ) document.getElementById('searchInput').value = currentQ;

  updateQueryLabel();

  try {
    const me = await fetch('/api/users/me', { credentials: 'include' });
    if (me.ok) {
      const u = await me.json();
      document.getElementById('navRight').innerHTML = `
        <span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);border:1px solid var(--accent);padding:5px 12px;border-radius:4px">${parseFloat(u.balance).toFixed(2)} ₽</span>
        <button class="btn btn-ghost" onclick="location.href='/profile'">Профиль</button>`;
    }
  } catch(e) {}

  await loadCategories();
  resetAndLoad();
}

// --- SEARCH ---
function doSearch() {
  currentQ = document.getElementById('searchInput').value.trim();
  currentPage = 0;
  hasNext = true;
  history.replaceState(null,'',currentQ ? `?q=${encodeURIComponent(currentQ)}` : '/search');
  updateQueryLabel();
  document.getElementById('productsGrid').innerHTML = '';
  loadProducts();
}

function updateQueryLabel() {
  const label = document.getElementById('queryLabel');
  label.innerHTML = currentQ
    ? `Результаты: <em>"${currentQ}"</em>`
    : 'Все товары';
}

function applyFilters() {
  currentPage = 0; hasNext = true;
  document.getElementById('productsGrid').innerHTML = '';
  loadProducts();
}

function selectSort(val, el) {
  currentSort = val;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function selectCat(id, el) {
  currentCat = id;
  document.querySelectorAll('.filter-cat').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function loadMore() { loadProducts(); }

function resetAndLoad() {
  currentPage = 0; hasNext = true;
  document.getElementById('productsGrid').innerHTML = '';
  loadProducts();
}

// --- LOAD PRODUCTS ---
async function loadProducts() {
  if (isLoading || !hasNext) return;
  isLoading = true;

  const priceMin = document.getElementById('priceMin').value;
  const priceMax = document.getElementById('priceMax').value;

  let url = `/api/products?page=${currentPage}&size=24`;
  if (currentQ) url += `&q=${encodeURIComponent(currentQ)}`;
  if (currentCat) url += `&categoryId=${currentCat}`;
  if (priceMin) url += `&priceMin=${priceMin}`;
  if (priceMax) url += `&priceMax=${priceMax}`;
  if (currentSort && currentSort !== 'createdAt') url += `&sort=${currentSort}`;

  try {
    const res = await fetch(url, { credentials: 'include' });
    const data = await res.json();
    const items = data.items || data.content || [];

    if (currentPage === 0 && items.length === 0) {
      showEmpty();
      isLoading = false;
      return;
    }

    renderProducts(items);
    document.getElementById('resultsCount').textContent =
      data.totalElements ? `${data.totalElements} товаров` : '';

    hasNext = currentPage < (data.totalPages || 1) - 1;
    currentPage++;

    const btn = document.getElementById('loadMoreBtn');
    btn.style.display = hasNext ? 'block' : 'none';
  } catch(e) { console.error(e); }

  isLoading = false;
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  products.forEach(p => {
    const el = document.createElement('div');
    el.className = 'product-card';
    el.onclick = () => location.href = `/product/${p.id}`;
    const cat = p.categories?.[0] || 'Цифровой товар';
    el.innerHTML = `
      <div class="card-img">${getCategoryEmoji(cat)}</div>
      <div class="card-body">
        <div class="card-cat">${cat.toUpperCase()}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-rating"><span>★</span> ${p.rating ? parseFloat(p.rating).toFixed(1) : '—'}</div>
        <div class="card-footer">
          <div class="card-price">${parseFloat(p.price).toFixed(2)} ₽</div>
          <div class="card-stock">${p.stockCount > 0 ? p.stockCount+' шт.' : 'нет'}</div>
        </div>
      </div>`;
    grid.appendChild(el);
  });
}

function showEmpty() {
  const popular = ['Steam ключи','Minecraft','VPN аккаунты','Прокси','Adobe'];
  document.getElementById('productsGrid').innerHTML = `
    <div class="empty" style="grid-column:1/-1">
      <div class="empty-title">Ничего не найдено</div>
      <div class="empty-sub">По запросу <strong>"${currentQ}"</strong> ничего нет.<br>Попробуйте другие слова или выберите категорию.</div>
      <div class="empty-suggestions">
        ${popular.map(t=>`<span class="suggest-tag" onclick="searchFor('${t}')">${t}</span>`).join('')}
      </div>
    </div>`;
  document.getElementById('loadMoreBtn').style.display = 'none';
}

function searchFor(q) {
  document.getElementById('searchInput').value = q;
  currentQ = q; currentPage = 0; hasNext = true;
  history.replaceState(null,'',`?q=${encodeURIComponent(q)}`);
  updateQueryLabel();
  document.getElementById('productsGrid').innerHTML = '';
  loadProducts();
}

// --- SUGGESTIONS (живой поиск) ---
function onInput(val) {
  clearTimeout(suggestTimer);
  if (val.length < 2) { hideSuggestions(); return; }
  suggestTimer = setTimeout(() => fetchSuggestions(val), 300);
}

async function fetchSuggestions(q) {
  try {
    const res = await fetch(`/api/products?q=${encodeURIComponent(q)}&size=5`, { credentials: 'include' });
    const data = await res.json();
    const items = data.items || data.content || [];
    showSuggestionsDropdown(items, q);
  } catch(e) {}
}

function showSuggestionsDropdown(items, q) {
  const box = document.getElementById('suggestions');
  if (!items.length) { hideSuggestions(); return; }
  box.innerHTML = items.map(p => `
    <div class="suggest-item" onmousedown="goToProduct(${p.id})">
      <span class="suggest-icon">${getCategoryEmoji(p.categories?.[0])}</span>
      <span>${highlight(p.title, q)}</span>
      <span style="margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--accent)">${parseFloat(p.price).toFixed(0)} ₽</span>
    </div>`).join('');
  box.classList.add('open');
}

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0,idx) + `<strong style="color:var(--accent)">${text.slice(idx,idx+q.length)}</strong>` + text.slice(idx+q.length);
}

function showSuggestions(val) { if (val.length > 1) fetchSuggestions(val); }
function hideSuggestions() { document.getElementById('suggestions').classList.remove('open'); }
function goToProduct(id) { location.href = `/product/${id}`; }

// --- CATEGORIES ---
async function loadCategories() {
  try {
    const res = await fetch('/api/categories', { credentials: 'include' });
    const cats = await res.json();
    const container = document.getElementById('filterCats');
    cats.forEach(c => {
      const el = document.createElement('div');
      el.className = 'filter-cat';
      el.textContent = c.name;
      el.onclick = () => selectCat(c.id, el);
      container.appendChild(el);
    });
  } catch(e) {}
}

// --- SCROLL ---
window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    loadProducts();
  }
});

function getCategoryEmoji(name) {
  if (!name) return '📦';
  const n = name.toLowerCase();
  if (n.includes('игр') || n.includes('game')) return '🎮';
  if (n.includes('прокси') || n.includes('proxy')) return '🌐';
  if (n.includes('аккаунт')) return '👤';
  if (n.includes('ключ') || n.includes('key')) return '🔑';
  if (n.includes('vpn')) return '🔒';
  return '📦';
}

init();
</script>
</body>
</html>
